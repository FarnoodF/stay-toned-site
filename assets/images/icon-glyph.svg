    <filter id="letter-shadow" x="-30%" y="-25%" width="160%" height="165%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.6" flood-color="#111827" flood-opacity="0.20" />
