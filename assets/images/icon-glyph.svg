<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 260 260"
  role="img"
  aria-label="StayToned"
  shape-rendering="geometricPrecision"
>
  <defs>
    <linearGradient id="red" x1="39" y1="21" x2="223" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF3437" />
      <stop offset="1" stop-color="#F0272F" />
    </linearGradient>
    <linearGradient id="orange" x1="72" y1="47" x2="176" y2="222" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF9700" />
      <stop offset="1" stop-color="#F47B00" />
    </linearGradient>
    <linearGradient id="green" x1="83" y1="67" x2="204" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#27C24E" />
      <stop offset="1" stop-color="#17A943" />
    </linearGradient>
    <filter id="ring-shadow" x="-12%" y="-12%" width="124%" height="130%" color-interpolation-filters="sRGB">
